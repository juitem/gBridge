<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>gbridge</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #0f1117;
      --surface:       #1a1d27;
      --surface2:      #22263a;
      --border:        #2e3347;
      --accent:        #5b8ef0;
      --accent-dim:    #3a5fc4;
      --accent-soft:   rgba(91,142,240,0.12);
      --danger:        #e05252;
      --danger-dim:    #b83e3e;
      --success:       #3ecf6e;
      --text:          #e2e4ef;
      --text-dim:      #7c85a6;
      --text-muted:    #4e566e;
      --user-bubble:   #1e3060;
      --gemini-bubble: #1a1d27;
      --radius:        12px;
      --header-h:      54px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.55;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════════════════════════════════════════════════════════
       SCREENS
    ═══════════════════════════════════════════════════════════════ */
    .screen {
      display: none;
      flex-direction: column;
      height: 100dvh;
    }
    .screen.active { display: flex; }

    /* ═══════════════════════════════════════════════════════════════
       SHARED HEADER
    ═══════════════════════════════════════════════════════════════ */
    .app-header {
      flex-shrink: 0;
      height: var(--header-h);
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 10px;
      position: relative;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--accent);
    }
    .logo span { color: var(--text-dim); font-weight: 400; }

    /* icon button */
    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--surface2); }
    .icon-btn svg { pointer-events: none; }

    .danger-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border: 1px solid rgba(224,82,82,0.35);
      border-radius: 8px;
      background: transparent;
      color: var(--danger);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .danger-btn:hover {
      background: rgba(224,82,82,0.1);
      border-color: var(--danger);
    }

    /* ═══════════════════════════════════════════════════════════════
       SCREEN 1 — SESSION LIST
    ═══════════════════════════════════════════════════════════════ */
    #screen-list .list-section-header {
      display: flex;
      align-items: center;
      padding: 18px 16px 10px;
      gap: 8px;
    }
    #screen-list .list-section-header h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      flex: 1;
    }

    #session-list-container {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 100px;
    }
    #session-list-container::-webkit-scrollbar { width: 4px; }
    #session-list-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* session card */
    .session-card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .session-card:hover {
      border-color: var(--accent);
      background: var(--surface2);
    }
    .session-card:active { transform: scale(0.99); }
    .session-card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
    }
    .session-card-title .session-icon { font-size: 16px; }
    .session-card-title .session-id {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 13px;
      color: var(--accent);
    }
    .session-card-workdir {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
      font-family: "SF Mono", "Fira Code", monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .session-card-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 60px 24px;
      color: var(--text-dim);
      text-align: center;
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 4px; }
    .empty-state .empty-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .empty-state .empty-sub   { font-size: 13px; color: var(--text-dim); }

    /* FAB */
    #fab {
      position: fixed;
      bottom: calc(24px + env(safe-area-inset-bottom));
      right: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 22px 0 16px;
      height: 52px;
      background: var(--accent);
      border: none;
      border-radius: 26px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(91,142,240,0.4);
      transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
      z-index: 50;
    }
    #fab:hover  { background: var(--accent-dim); box-shadow: 0 6px 24px rgba(91,142,240,0.5); }
    #fab:active { transform: scale(0.96); }

    /* ═══════════════════════════════════════════════════════════════
       NEW SESSION MODAL  (bottom sheet)
    ═══════════════════════════════════════════════════════════════ */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .bottom-sheet {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: slideUp 0.22s cubic-bezier(.22,.61,.36,1);
      max-height: 85dvh;
    }
    @media (min-width: 640px) {
      .modal-overlay { align-items: center; }
      .bottom-sheet  { border-radius: 16px; max-height: 70dvh; }
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .sheet-header {
      display: flex;
      align-items: center;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .sheet-header h3 { font-size: 16px; font-weight: 700; flex: 1; }
    .sheet-close {
      width: 30px; height: 30px;
      border: none; border-radius: 50%;
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .sheet-close:hover { background: var(--border); }

    /* dir picker inside sheet */
    .dir-picker {
      display: flex;
      flex-direction: column;
    }
    .dir-picker-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      padding: 12px 16px 6px;
    }
    .dir-favorites {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid var(--border);
    }
    .fav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.1s;
      user-select: none;
    }
    .fav-item:hover { background: var(--surface2); }
    .fav-item .fav-path {
      font-size: 11px;
      color: var(--text-muted);
      font-family: "SF Mono","Fira Code",monospace;
      margin-top: 1px;
    }
    .fav-item .fav-info { display: flex; flex-direction: column; gap: 1px; }

    .dir-browse-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .dir-browse-row .browse-path {
      flex: 1;
      font-family: "SF Mono","Fira Code",monospace;
      font-size: 12px;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btn-outline {
      padding: 5px 12px;
      font-size: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s;
    }
    .btn-outline:hover { background: var(--border); }

    /* radio group */
    .radio-group {
      display: flex;
      gap: 0;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .radio-pill {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 0;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      user-select: none;
    }
    .radio-pill:first-child { border-radius: 8px 0 0 8px; }
    .radio-pill:last-child  { border-radius: 0 8px 8px 0; border-left: none; }
    .radio-pill input { display: none; }
    .radio-pill.selected {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }

    .sheet-footer {
      display: flex;
      gap: 10px;
      padding: 14px 16px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom));
    }
    .btn-primary {
      flex: 1;
      padding: 12px 20px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover  { background: var(--accent-dim); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }
    .btn-secondary {
      padding: 12px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-dim);
      font-size: 15px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .btn-secondary:hover { background: var(--surface2); }

    /* ═══════════════════════════════════════════════════════════════
       DIR BROWSER MODAL  (inside new-session flow)
    ═══════════════════════════════════════════════════════════════ */
    #browse-modal {
      z-index: 300;
    }
    .browse-sheet {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: slideUp 0.22s cubic-bezier(.22,.61,.36,1);
      max-height: 80dvh;
    }
    @media (min-width: 640px) {
      .browse-sheet { border-radius: 16px; max-height: 65dvh; }
    }
    .browse-path-bar {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .browse-path-bar .cur-path {
      flex: 1;
      font-family: "SF Mono","Fira Code",monospace;
      font-size: 12px;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #browse-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    #browse-list::-webkit-scrollbar { width: 4px; }
    #browse-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .browse-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.1s;
      user-select: none;
    }
    .browse-item:hover { background: var(--surface2); }
    .browse-item.parent { color: var(--text-dim); }
    .browse-item .bi-name { flex: 1; }
    .browse-footer {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
    }

    /* ═══════════════════════════════════════════════════════════════
       SCREEN 2 — CHAT
    ═══════════════════════════════════════════════════════════════ */
    #chat-subheader {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-family: "SF Mono","Fira Code",monospace;
      font-size: 12px;
      color: var(--text-dim);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
      display: flex;
      gap: 8px;
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
    .msg-row.user   { justify-content: flex-end; }
    .msg-row.gemini { justify-content: flex-start; }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .avatar.gemini-av { background: linear-gradient(135deg, #5b8ef0 0%, #a56bf5 100%); }
    .avatar.user-av   { background: var(--surface2); border: 1px solid var(--border); }

    .bubble {
      max-width: min(80%, 560px);
      padding: 9px 13px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
    }
    .bubble.user {
      background: var(--user-bubble);
      border: 1px solid rgba(91,142,240,0.25);
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
    }
    .bubble.gemini {
      background: var(--gemini-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .bubble.error-bubble {
      background: rgba(224,82,82,0.1);
      border-color: rgba(224,82,82,0.3);
      color: var(--danger);
    }

    /* markdown inside gemini bubble */
    .bubble.gemini p             { margin-bottom: 6px; }
    .bubble.gemini p:last-child  { margin-bottom: 0; }
    .bubble.gemini h1,.bubble.gemini h2,.bubble.gemini h3 {
      margin: 10px 0 5px; font-weight: 700; color: var(--accent);
    }
    .bubble.gemini h1 { font-size: 1.1em; }
    .bubble.gemini h2 { font-size: 1.0em; }
    .bubble.gemini h3 { font-size: 0.95em; }
    .bubble.gemini ul,.bubble.gemini ol { padding-left: 20px; margin-bottom: 6px; }
    .bubble.gemini li { margin-bottom: 3px; }
    .bubble.gemini code {
      background: #0d0f1a;
      padding: 1px 5px;
      border-radius: 4px;
      font-family: "SF Mono","Fira Code",monospace;
      font-size: 12.5px;
      color: #b3f0a0;
    }
    .bubble.gemini pre {
      background: #0d0f1a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 6px 0;
    }
    .bubble.gemini pre code {
      background: none; padding: 0; font-size: 12.5px;
    }
    .bubble.gemini blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 10px;
      color: var(--text-dim);
      margin: 6px 0;
    }
    .bubble.gemini table { border-collapse: collapse; font-size: 13px; margin: 6px 0; width: 100%; }
    .bubble.gemini th,.bubble.gemini td { border: 1px solid var(--border); padding: 5px 9px; }
    .bubble.gemini th { background: var(--surface2); }
    .bubble.gemini a  { color: var(--accent); }
    .bubble.gemini hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
    .bubble.gemini strong { color: #fff; }

    /* typing indicator */
    .typing-indicator {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 0 2px;
    }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.3s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.18s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); opacity: 0.4; }
      40%          { transform: translateY(-6px); opacity: 1; }
    }

    /* chat empty state */
    #chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-dim);
      user-select: none;
      pointer-events: none;
    }
    #chat-empty .big  { font-size: 44px; }
    #chat-empty p     { font-size: 14px; }

    /* ─── Input bar ─── */
    #input-bar {
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 12px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    #prompt {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      padding: 9px 12px;
      resize: none;
      outline: none;
      max-height: calc(6 * 1.5 * 14px + 18px);
      overflow-y: auto;
      transition: border-color 0.15s;
    }
    #prompt:focus { border-color: var(--accent); }
    #prompt::placeholder { color: var(--text-muted); }

    #send-btn {
      flex-shrink: 0;
      width: 42px; height: 42px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }
    #send-btn:hover   { background: var(--accent-dim); }
    #send-btn:active  { transform: scale(0.93); }
    #send-btn svg     { pointer-events: none; }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    /* status dot */
    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.connected  { background: var(--success); }
    #status-dot.streaming  { background: var(--accent); animation: pulse 1s infinite; }
    #status-dot.error      { background: var(--danger); }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.35; }
    }

    /* ─── Toast ─── */
    #toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #2b2f3e;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 18px;
      border-radius: 10px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
      transition: opacity 0.22s, transform 0.22s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error-toast { background: var(--danger); border-color: var(--danger-dim); }

    /* spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Responsive tweaks ─── */
    @media (min-width: 640px) {
      #screen-list { max-width: 620px; margin: 0 auto; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════
     SCREEN 1: SESSION LIST
═══════════════════════════════════════════════════════════════ -->
<div id="screen-list" class="screen active">
  <header class="app-header">
    <div class="logo">gbridge<span>.ai</span></div>
    <div style="flex:1"></div>

<!-- Toast -->
<div id="toast"></div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════════
// marked config
// ══════════════════════════════════════════════════════════════════
marked.setOptions({ breaks: true, gfm: true });

// ══════════════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════════════
const state = {
  // session list
  sessions: [],

  // new session form
  newSessionPath: '/',
  newSessionMode: 'new',   // 'new' | 'continue'

  // browse modal
  browsePath: '/',

  // chat
  activeSessionId: null,
  activeWorkdir:   null,
  ws:              null,
  streaming:       false,
  currentGeminiBubble: null,
  currentGeminiText:   '',
};

// ══════════════════════════════════════════════════════════════════
// DOM refs
// ══════════════════════════════════════════════════════════════════
const screenList        = document.getElementById('screen-list');
const screenChat        = document.getElementById('screen-chat');

// list screen
const sessionContainer  = document.getElementById('session-list-container');
const refreshBtn        = document.getElementById('refresh-btn');
const fab               = document.getElementById('fab');

// new session modal
const newSessionModal   = document.getElementById('new-session-modal');
const newSessionClose   = document.getElementById('new-session-close');
const newSessionCancel  = document.getElementById('new-session-cancel');
const newSessionStart   = document.getElementById('new-session-start');
const newSessionPathEl  = document.getElementById('new-session-path');
const browseBtn         = document.getElementById('browse-btn');
const pillNew           = document.getElementById('pill-new');
const pillCont          = document.getElementById('pill-cont');

// browse modal
const browseModal       = document.getElementById('browse-modal');
const browseClose       = document.getElementById('browse-close');
const browseCancel      = document.getElementById('browse-cancel');
const browseSelect      = document.getElementById('browse-select');
const browseCurPath     = document.getElementById('browse-cur-path');
const browseList        = document.getElementById('browse-list');

// chat screen
const backBtn           = document.getElementById('back-btn');
const deleteBtn         = document.getElementById('delete-btn');
const chatSessionId     = document.getElementById('chat-session-id');
const chatWorkdir       = document.getElementById('chat-workdir');
const chatSubheader     = document.getElementById('chat-subheader');
const messagesEl        = document.getElementById('messages');
const chatEmpty         = document.getElementById('chat-empty');
const promptEl          = document.getElementById('prompt');
const sendBtn           = document.getElementById('send-btn');
const statusDot         = document.getElementById('status-dot');
const toast             = document.getElementById('toast');

// ══════════════════════════════════════════════════════════════════
// Helpers
// ══════════════════════════════════════════════════════════════════
function stripAnsi(str) {
  return str
    .replace(/\x1B\[[0-9;]*[mGKHFJABCDEF]/g, '')
    .replace(/\x1B\][^\x07]*\x07/g, '')
    .replace(/\x1B[()][AB012]/g, '')
    .replace(/\x1B[=>]/g, '')
    .replace(/\r/g, '');
}

function escapeHtml(t) {
  return t
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

let toastTimer = null;
function showToast(msg, isError = false, dur = 3500) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.className = isError ? 'show error-toast' : 'show';
  toastTimer = setTimeout(() => toast.className = '', dur);
}

function setStatus(s) {
  statusDot.className = s || '';
}

function scrollBottom(force = false) {
  const nearBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 140;
  if (nearBottom || force) messagesEl.scrollTop = messagesEl.scrollHeight;
}

function relativeTime(isoStr) {
  const diff = Math.floor((Date.now() - new Date(isoStr)) / 1000);
  if (diff < 60)        return `${diff}초 전`;
  if (diff < 3600)      return `${Math.floor(diff / 60)}분 전`;
  if (diff < 86400)     return `${Math.floor(diff / 3600)}시간 전`;
  return `${Math.floor(diff / 86400)}일 전`;
}

// ══════════════════════════════════════════════════════════════════
// Screen navigation
// ══════════════════════════════════════════════════════════════════
function showScreen(name) {
  screenList.classList.toggle('active', name === 'list');
  screenChat.classList.toggle('active', name === 'chat');
}

// ══════════════════════════════════════════════════════════════════
// SCREEN 1 — Session list
// ══════════════════════════════════════════════════════════════════
async function loadSessions() {
  // animate refresh icon
  refreshBtn.querySelector('svg').style.animation = 'spin 0.7s linear infinite';
  try {
    const res = await fetch('/api/sessions');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    state.sessions = await res.json();
    renderSessionList();
  } catch (e) {
    showToast('세션 목록을 불러올 수 없습니다: ' + e.message, true);
  } finally {
    refreshBtn.querySelector('svg').style.animation = '';
  }
}

function renderSessionList() {
  sessionContainer.innerHTML = '';

  if (!state.sessions || state.sessions.length === 0) {
    sessionContainer.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🌉</div>
        <div class="empty-title">활성 세션 없음</div>
        <div class="empty-sub">아래 버튼을 눌러 새 세션을 시작하세요</div>
      </div>
    `;
    return;
  }

  state.sessions.forEach(s => {
    const card = document.createElement('div');
    card.className = 'session-card';
    const shortId = s.id ? s.id.substring(0, 8) : '?';
    const timeAgo = s.created_at ? relativeTime(s.created_at) : '';
    const msgCount = s.message_count != null ? `메시지 ${s.message_count}개` : '';
    const meta = [msgCount, timeAgo].filter(Boolean).join(' · ');

    card.innerHTML = `
      <div class="session-card-title">
        <span class="session-icon">💬</span>
        <span class="session-id">세션 ${shortId}</span>
      </div>
      <div class="session-card-workdir">
        <span>📁</span>
        <span>${escapeHtml(s.workdir || '/')}</span>
      </div>
      ${meta ? `<div class="session-card-meta">${escapeHtml(meta)}</div>` : ''}
    `;
    card.addEventListener('click', () => enterChat(s.id, s.workdir));
    sessionContainer.appendChild(card);
  });
}

refreshBtn.addEventListener('click', loadSessions);
fab.addEventListener('click', openNewSessionModal);

// ══════════════════════════════════════════════════════════════════
// NEW SESSION MODAL
// ══════════════════════════════════════════════════════════════════
function openNewSessionModal() {
  state.newSessionPath = '/';
  state.newSessionMode = 'new';
  newSessionPathEl.textContent = state.newSessionPath;
  updatePills();
  newSessionModal.classList.add('open');
}

function closeNewSessionModal() {
  newSessionModal.classList.remove('open');
}

function updatePills() {
  pillNew.classList.toggle('selected', state.newSessionMode === 'new');
  pillCont.classList.toggle('selected', state.newSessionMode === 'continue');
}

newSessionClose.addEventListener('click', closeNewSessionModal);
newSessionCancel.addEventListener('click', closeNewSessionModal);
newSessionModal.addEventListener('click', e => {
  if (e.target === newSessionModal) closeNewSessionModal();
});

// favorites in new-session modal
newSessionModal.querySelectorAll('.fav-item').forEach(el => {
  el.addEventListener('click', () => {
    state.newSessionPath = el.dataset.path;
    newSessionPathEl.textContent = state.newSessionPath;
  });
});

// radio pills
pillNew.addEventListener('click', () => {
  state.newSessionMode = 'new';
  updatePills();
});
pillCont.addEventListener('click', () => {
  state.newSessionMode = 'continue';
  updatePills();
});

// start button
newSessionStart.addEventListener('click', async () => {
  newSessionStart.disabled = true;
  newSessionStart.innerHTML = '<div class="spinner"></div>';
  try {
    const res = await fetch('/api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        workdir: state.newSessionPath,
        resume: state.newSessionMode === 'continue',
      }),
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err || `HTTP ${res.status}`);
    }
    const data = await res.json();
    closeNewSessionModal();
    await loadSessions();
    enterChat(data.id, state.newSessionPath);
  } catch (e) {
    showToast('세션 생성 실패: ' + e.message, true);
  } finally {
    newSessionStart.disabled = false;
    newSessionStart.textContent = '시작';
  }
});

// ══════════════════════════════════════════════════════════════════
// DIRECTORY BROWSER MODAL
// ══════════════════════════════════════════════════════════════════
browseBtn.addEventListener('click', () => {
  state.browsePath = state.newSessionPath || '/';
  openBrowseModal();
});

async function openBrowseModal() {
  browseModal.classList.add('open');
  await renderBrowseList(state.browsePath);
}

function closeBrowseModal() {
  browseModal.classList.remove('open');
}

browseClose.addEventListener('click',  closeBrowseModal);
browseCancel.addEventListener('click', closeBrowseModal);
browseModal.addEventListener('click',  e => { if (e.target === browseModal) closeBrowseModal(); });

browseSelect.addEventListener('click', () => {
  state.newSessionPath = state.browsePath;
  newSessionPathEl.textContent = state.newSessionPath;
  closeBrowseModal();
});

async function renderBrowseList(path) {
  state.browsePath = path;
  browseCurPath.textContent = path || '/';
  browseList.innerHTML = `
    <div class="browse-item">
      <span>⏳</span>
      <span class="bi-name">불러오는 중…</span>
    </div>`;

  let data;
  try {
    const res = await fetch(`/api/browse?path=${encodeURIComponent(path)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    data = await res.json();
  } catch (e) {
    browseList.innerHTML = `<div class="browse-item" style="color:var(--danger)">불러오기 실패: ${escapeHtml(e.message)}</div>`;
    return;
  }

  browseList.innerHTML = '';

  // ".." parent
  const parent = data.parent;
  if (parent !== null && parent !== undefined) {
    const item = document.createElement('div');
    item.className = 'browse-item parent';
    item.innerHTML = `<span>↩</span><span class="bi-name">.. (상위 폴더)</span>`;
    item.addEventListener('click', () => renderBrowseList(parent));
    browseList.appendChild(item);
  }

  const entries = data.entries || [];
  if (entries.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'browse-item';
    empty.style.color = 'var(--text-muted)';
    empty.textContent = '(하위 폴더 없음)';
    browseList.appendChild(empty);
    return;
  }

  entries.forEach(entry => {
    const item = document.createElement('div');
    item.className = 'browse-item';
    item.innerHTML = `<span>📂</span><span class="bi-name">${escapeHtml(entry.name)}</span>`;
    item.addEventListener('click', () => renderBrowseList(entry.path));
    browseList.appendChild(item);
  });
}

// ══════════════════════════════════════════════════════════════════
// SCREEN 2 — CHAT
// ══════════════════════════════════════════════════════════════════
function enterChat(sessionId, workdir) {
  state.activeSessionId = sessionId;
  state.activeWorkdir   = workdir || '/';

  // update chat header
  chatSessionId.textContent = `세션 ${sessionId ? sessionId.substring(0, 8) : '?'}`;
  chatWorkdir.textContent   = state.activeWorkdir;

  // clear messages
  messagesEl.innerHTML = '';
  chatEmpty.style.display = 'flex';
  messagesEl.appendChild(chatEmpty);

  // reset chat state
  state.streaming = false;
  state.currentGeminiBubble = null;
  state.currentGeminiText   = '';
  promptEl.value = '';
  promptEl.style.height = 'auto';
  sendBtn.disabled = false;
  setStatus('');

  showScreen('chat');
  connectWS(sessionId);
}

backBtn.addEventListener('click', () => {
  disconnectWS();
  showScreen('list');
  loadSessions();
});

deleteBtn.addEventListener('click', async () => {
  if (!state.activeSessionId) return;
  if (!confirm(`세션 ${state.activeSessionId.substring(0,8)}을 삭제하시겠습니까?`)) return;
  try {
    const res = await fetch(`/api/sessions/${encodeURIComponent(state.activeSessionId)}`, {
      method: 'DELETE',
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    disconnectWS();
    showScreen('list');
    await loadSessions();
    showToast('세션이 삭제되었습니다.');
  } catch (e) {
    showToast('삭제 실패: ' + e.message, true);
  }
});

// ── Message rendering ───────────────────────────────────────────
function hideEmptyState() {
  if (chatEmpty.parentNode) chatEmpty.parentNode.removeChild(chatEmpty);
}

function appendUserBubble(text) {
  hideEmptyState();
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `
    <div class="bubble user">${escapeHtml(text)}</div>
    <div class="avatar user-av">👤</div>
  `;
  messagesEl.appendChild(row);
  scrollBottom(true);
}

function appendGeminiBubble() {
  hideEmptyState();
  const row = document.createElement('div');
  row.className = 'msg-row gemini';
  row.innerHTML = `
    <div class="avatar gemini-av">✦</div>
    <div class="bubble gemini">
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>
    </div>
  `;
  messagesEl.appendChild(row);
  scrollBottom(true);
  return row.querySelector('.bubble.gemini');
}

function appendErrorBubble(msg) {
  hideEmptyState();
  const row = document.createElement('div');
  row.className = 'msg-row gemini';
  row.innerHTML = `
    <div class="avatar gemini-av">✦</div>
    <div class="bubble gemini error-bubble">${escapeHtml(msg)}</div>
  `;
  messagesEl.appendChild(row);
  scrollBottom(true);
}

function renderGeminiBubble(bubble, text) {
  const html = marked.parse(text || '');
  bubble.innerHTML = html || '<span style="color:var(--text-muted);font-style:italic">응답 없음</span>';
  scrollBottom();
}

// ── WebSocket ──────────────────────────────────────────────────
function connectWS(sessionId) {
  disconnectWS();

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const url   = `${proto}://${location.host}/ws/session/${encodeURIComponent(sessionId)}`;
  const sock  = new WebSocket(url);
  state.ws = sock;

  sock.onopen = () => {
    setStatus('connected');
  };

  sock.onmessage = (evt) => {
    let msg;
    try {
      msg = JSON.parse(evt.data);
    } catch {
      // raw chunk fallback (shouldn't happen with new API)
      if (state.currentGeminiBubble) {
        state.currentGeminiText += stripAnsi(evt.data);
        const partial = marked.parse(state.currentGeminiText);
        state.currentGeminiBubble.innerHTML = partial;
        scrollBottom();
      }
      return;
    }

    handleWsMessage(msg);
  };

  sock.onerror = () => {
    setStatus('error');
    if (state.streaming && state.currentGeminiBubble) {
      renderGeminiBubble(state.currentGeminiBubble, state.currentGeminiText || '');
      finishStreaming();
    }
    showToast('WebSocket 오류가 발생했습니다.', true);
  };

  sock.onclose = (e) => {
    setStatus('');
    state.ws = null;
    if (state.streaming) {
      if (state.currentGeminiBubble && state.currentGeminiText) {
        renderGeminiBubble(state.currentGeminiBubble, state.currentGeminiText);
      }
      finishStreaming();
    }
  };
}

function disconnectWS() {
  if (state.ws) {
    state.ws.onclose = null;
    state.ws.close();
    state.ws = null;
  }
  setStatus('');
}

function finishStreaming() {
  state.streaming = false;
  state.currentGeminiBubble = null;
  state.currentGeminiText   = '';
  sendBtn.disabled = false;
  if (state.ws) setStatus('connected');
}

function handleWsMessage(msg) {
  switch (msg.role) {
    case 'user':
      appendUserBubble(msg.content || '');
      break;

    case 'gemini_start':
      state.currentGeminiBubble = appendGeminiBubble();
      state.currentGeminiText   = '';
      state.streaming = true;
      sendBtn.disabled = true;
      setStatus('streaming');
      break;

    case 'gemini_chunk': {
      if (!state.currentGeminiBubble) {
        // late start — create bubble
        state.currentGeminiBubble = appendGeminiBubble();
        state.currentGeminiText   = '';
        state.streaming = true;
        sendBtn.disabled = true;
        setStatus('streaming');
      }
      const chunk = stripAnsi(msg.content || '');
      state.currentGeminiText += chunk;
      // live partial render
      state.currentGeminiBubble.innerHTML = marked.parse(state.currentGeminiText);
      scrollBottom();
      break;
    }

    case 'gemini_done':
      if (state.currentGeminiBubble) {
        renderGeminiBubble(state.currentGeminiBubble, state.currentGeminiText);
      }
      finishStreaming();
      if (state.ws) setStatus('connected');
      break;

    case 'error':
      appendErrorBubble(msg.content || '알 수 없는 오류');
      if (state.currentGeminiBubble) finishStreaming();
      break;

    default:
      break;
  }
}

// ── Send message ──────────────────────────────────────────────
function sendMessage() {
  const text = promptEl.value.trim();
  if (!text || state.streaming) return;
  if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
    showToast('연결이 끊겼습니다. 페이지를 새로고침하세요.', true);
    return;
  }

  promptEl.value = '';
  promptEl.style.height = 'auto';

  state.ws.send(JSON.stringify({ prompt: text }));
}

promptEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
sendBtn.addEventListener('click', sendMessage);

// textarea auto-grow
promptEl.addEventListener('input', () => {
  promptEl.style.height = 'auto';
  const lineH = parseFloat(getComputedStyle(promptEl).lineHeight);
  const maxH  = lineH * 6 + 18;
  promptEl.style.height = Math.min(promptEl.scrollHeight, maxH) + 'px';
});

// ══════════════════════════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════════════════════════
loadSessions();
</script>
</body>
</html>
